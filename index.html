<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T.T App - Smart Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              tt: {
                blue: '#3B82F6',
                red: '#EF4444',
                green: '#10B981',
                white: '#FFFFFF',
                dark: '#0F172A',
                card: '#1E293B'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'bounce-in': 'bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
              'float': 'float 3s ease-in-out infinite'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' }
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' }
              },
              bounceIn: {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0F172A;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(156, 163, 175, 0.3);
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(156, 163, 175, 0.6);
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      body.nature-theme {
        background: linear-gradient(135deg, rgba(220,80,80,0.6), rgba(70,130,180,0.6), rgba(100,180,100,0.6), rgba(255,215,100,0.6));
        background-attachment: fixed;
        color: #111827;
      }
      body.ocean-theme {
        background: linear-gradient(135deg, rgba(0,119,182,0.6), rgba(0,180,216,0.6), rgba(144,224,239,0.6));
        background-attachment: fixed;
        color: #111827;
      }
      body.sunset-theme {
        background: linear-gradient(135deg, rgba(255,126,103,0.6), rgba(255,163,113,0.6), rgba(255,203,164,0.6));
        background-attachment: fixed;
        color: #111827;
      }
      body.ladies-theme {
        background: linear-gradient(135deg, #ff9a9e, #fecfef, #ffdde1);
        background-attachment: fixed;
        color: #111827;
      }
      body.white-theme {
        background: #F9FAFB;
        background-attachment: fixed;
        color: #111827;
      }
      body.custom-theme {
        background: var(--custom-theme-color, #0F172A);
        background-attachment: fixed;
        color: var(--custom-text-color, #ffffff);
      }
      body.nature-theme .glass-panel, body.ocean-theme .glass-panel, body.sunset-theme .glass-panel, body.ladies-theme .glass-panel {
        background: rgba(255, 255, 255, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      body.white-theme .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }
      body.custom-theme .glass-panel {
        background: var(--custom-glass-bg, rgba(0, 0, 0, 0.3));
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      body.nature-theme ::-webkit-scrollbar-track, body.ocean-theme ::-webkit-scrollbar-track, body.sunset-theme ::-webkit-scrollbar-track, body.ladies-theme ::-webkit-scrollbar-track, body.white-theme ::-webkit-scrollbar-track, body.custom-theme ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.2);
      }
      body.nature-theme ::-webkit-scrollbar-thumb {
        background: rgba(100, 180, 100, 0.8);
      }
      body.ocean-theme ::-webkit-scrollbar-thumb {
        background: rgba(0, 119, 182, 0.8);
      }
      body.sunset-theme ::-webkit-scrollbar-thumb {
        background: rgba(255, 126, 103, 0.8);
      }
      body.ladies-theme ::-webkit-scrollbar-thumb {
        background: rgba(255, 105, 180, 0.8);
      }
      body.white-theme ::-webkit-scrollbar-thumb {
        background: rgba(150, 150, 150, 0.8);
      }
      body.custom-theme ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "date-fns": "https://esm.sh/date-fns@^4.1.0"
  }
}
</script>
